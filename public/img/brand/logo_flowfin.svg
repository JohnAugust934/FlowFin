<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="100%" height="100%">
  <defs>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    
    <linearGradient id="gradGreen" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <g transform="translate(40, 40)" filter="url(#shadow)">
    <path d="M 0 50 C 30 50, 40 10, 70 10 C 85 10, 95 15, 105 25" 
          fill="none" stroke="url(#gradBlue)" stroke-width="16" 
          stroke-linecap="round" stroke-linejoin="round"/>
          
    <path d="M 15 70 C 45 70, 55 30, 85 30 L 110 30" 
          fill="none" stroke="url(#gradGreen)" stroke-width="16" 
          stroke-linecap="round" stroke-linejoin="round"/>
          
    <polyline points="90,10 110,30 90,50" 
              fill="none" stroke="url(#gradGreen)" stroke-width="16" 
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="180" y="90" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="56" letter-spacing="-1.5">
    <tspan fill="#1E3A8A">Flow</tspan><tspan fill="#059669">Fin</tspan>
  </text>
  
  <text x="185" y="120" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="14" fill="#6B7280" letter-spacing="2.5">
    CONTROLE FINANCEIRO
  </text>
</svg>
