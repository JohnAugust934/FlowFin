<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2563EB">
    <title>Sem conexão — FlowFin</title>
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #0a0a0a; color: #e5e7eb; }
            .card { background: #171717 !important; border-color: rgba(255,255,255,.08) !important; }
            .hint { color: #9ca3af !important; }
        }
        .card {
            width: 100%;
            max-width: 380px;
            text-align: center;
            background: #fff;
            border: 1px solid rgba(15,23,42,.08);
            border-radius: 20px;
            padding: 32px 24px;
            box-shadow: 0 10px 30px rgba(15,23,42,.08);
        }
        .badge {
            width: 64px; height: 64px;
            margin: 0 auto 18px;
            border-radius: 18px;
            background: linear-gradient(135deg, #2563EB, #1E3A8A);
            display: flex; align-items: center; justify-content: center;
        }
        h1 { font-size: 20px; margin: 0 0 8px; }
        p { margin: 0 0 20px; line-height: 1.5; font-size: 15px; }
        .hint { color: #64748b; font-size: 13px; }
        button {
            appearance: none; border: 0; cursor: pointer;
            background: #2563EB; color: #fff;
            font-size: 15px; font-weight: 600;
            padding: 12px 20px; border-radius: 12px;
            width: 100%;
        }
        button:active { transform: translateY(1px); }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12h18M3 6h18M3 18h18"/>
            </svg>
        </div>
        <h1>Você está sem internet</h1>
        <p>Não conseguimos carregar esta tela agora. Suas transações registradas offline ficam guardadas e sincronizam sozinhas quando a conexão voltar.</p>
        <button onclick="location.reload()">Tentar de novo</button>
        <p class="hint" style="margin-top:16px;margin-bottom:0;">FlowFin</p>
    </div>
    <script>
        // Recarrega automaticamente assim que a conexão voltar.
        window.addEventListener('online', () => location.reload());
    </script>
</body>
</html>
